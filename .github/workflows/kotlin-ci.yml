name: kotlin

on:
  pull_request:
    paths:
      - "kotlin/**"
      - ".github/workflows/kotlin-ci.yml"
  push:
    branches: [main]
    paths:
      - "kotlin/**"
      - ".github/workflows/kotlin-ci.yml"

permissions:
  contents: write

defaults:
  run:
    working-directory: kotlin

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      # core: JVM 테스트(케이스 테이블) + iOS klib 컴파일(commonMain 오염 차단, 리눅스에서 가능)
      - name: Quality gates (format + static analysis)
        run: ./gradlew spotlessCheck detekt
      - name: Build and test
        run: ./gradlew :core:jvmTest :core:compileKotlinIosArm64 :app:assembleDebug
      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nexus-debug-apk
          path: kotlin/app/build/outputs/apk/debug/app-debug.apk
      # main 머지 시: GitHub Release로 APK 배포 (설치 링크 = 릴리즈 페이지)
      - name: Release APK
        if: github.event_name == 'push'
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "build-${{ github.run_number }}" \
            kotlin/app/build/outputs/apk/debug/app-debug.apk \
            --title "NEXUS dev build ${{ github.run_number }}" \
            --notes "main 자동 빌드 — 커밋 ${{ github.sha }}"
